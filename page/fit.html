<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model: fit test</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .section {
        margin-bottom: 20px;
      }

      model {
        background-color: #007700;
      }

      model img {
        width: 400px;
        height: 400px;
      }

      #model1 {
        width: 400px;
        height: 400px;
      }

      #model2 {
        width: 400px;
        height: 600px;
      }

      #model2 img {
        margin-top: 100px;
      }

      #model3 {
        width: 600px;
        height: 400px;
      }

      #model3 img {
        margin-left: 100px;
      }
    </style>
  </head>
  <body>
    <script type="module">
      if (new URLSearchParams(location.search).has('polyfill') && !window.HTMLModelElement) {
        await import('../model-element-polyfill/model-element-polyfill.js');
      }
    </script>
    <script>
      var on = new URLSearchParams(location.search).has('polyfill');
      document.write(
        '<a class="polyfill-toggle" href="' +
        (on ? location.pathname : location.pathname + '?polyfill') + '">' +
        '<span class="polyfill-toggle-label">Polyfill</span>' +
        '<span class="polyfill-toggle-track"' + (on ? ' style="background:#34c759"' : '') + '>' +
        '<span class="polyfill-toggle-knob"' + (on ? ' style="transform:translateX(16px)"' : '') + '></span>' +
        '</span></a>'
      );
    </script>
    <div class="container">
      <h1>Model: Fit test</h1>
      <hr />
      <pre>
&lt;model alt="A model of a cube"&gt;
  &lt;source src="cube.usdz" type="model/vnd.usdz+zip" /&gt;
  &lt;source src="cube.glb" type="model/gltf-binary" /&gt;
&lt;/model&gt;
</pre
      >

      <div class="section">
        <model id="model1" alt="A model of a cube">
          <source src="../assets/cube.usdz" type="model/vnd.usdz+zip" />
          <source src="../assets/cube.glb" type="model/gltf-binary" />
          <img src="../assets/cube.png" alt="An image of a model of a cube" />
        </model>
      </div>

      <div class="section">
        <model id="model2" alt="A model of a cube">
          <source src="../assets/cube.usdz" type="model/vnd.usdz+zip" />
          <source src="../assets/cube.glb" type="model/gltf-binary" />
          <img src="../assets/cube.png" alt="An image of a model of a cube" />
        </model>
      </div>

      <div class="section">
        <model id="model3" alt="A model of a cube">
          <source src="../assets/cube.usdz" type="model/vnd.usdz+zip" />
          <source src="../assets/cube.glb" type="model/gltf-binary" />
          <img src="../assets/cube.png" alt="An image of a model of a cube" />
        </model>
      </div>
    </div>
  </body>
</html>
